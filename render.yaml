services:
  - type: web
    name: instagram-reel-downloader
    runtime: node
    buildCommand: npm install && ./node_modules/.bin/playwright install chromium && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/.playwright-browsers
